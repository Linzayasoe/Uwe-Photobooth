{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uwe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'booth/images/logo.png' %}"
    />
  </head>
  <body class="bg-[#A5C6C1] min-h-screen flex flex-col">
    <!-- Navigation bar -->
    <div class="flex justify-center">
      <div
        class="w-[1040px] h-[100px] flex justify-between items-center mr-[200px] ml-[200px] border-b border-[#2C3F56] border-b-[2px]"
      >
        <!-- logo and text -->
        <div class="flex items-center space-x-10">
          <img
            class="w-[80px] h-[80px]"
            src="{% static 'booth/images/logo.png' %}"
            alt="logo"
          />
          <p
            style="font-family: &quot;Shantell Sans&quot;"
            class="text-3xl font-extrabold text-[#D75A4B]"
          >
            UWE Photobooth
          </p>
        </div>
        <!-- navi -->
        <div
          class="w-[478px] h-[52px] bg-white/20 backdrop-blur-xl border-b border-white/30 shadow-lg shadow-black/10 flex items-center justify-between space-x-[50px] rounded-[30px] font-[Poppin] px-10"
        >
          <a
            href=""
            class="text-[20px] font-light text-[#2C3F56] transition-all duration-300 hover:scale-110"
            >HOME</a
          >
          <a
            href=""
            class="text-[20px] font-light text-[#2C3F56] transition-all duration-300 hover:scale-110"
            >ABOUT US</a
          >
          <a
            href=""
            class="text-[20px] font-light text-[#2C3F56] transition-all duration-300 hover:scale-110"
            >OUR POLICY</a
          >
        </div>
      </div>
    </div>
  </body>

  <main class="flex-1 px-10 py-12">{% block content %} {% endblock %}</main>

  <footer
    class="w-full h-[80px] bg-white/20 backdrop-blur-xl border-t border-white/30 shadow-lg shadow-black/10 flex items-center justify-center px-6"
  >
    <p class="font-shantell text-lg font-light text-black/80">
      © 2026 UWE Photobooth — Built by Zay
    </p>
  </footer>
</html>
